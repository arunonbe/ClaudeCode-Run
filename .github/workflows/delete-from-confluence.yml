name: Delete All Pages from Confluence

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE to confirm'
        required: true
        default: ''
      mode:
        description: 'by-parent = delete Run 1 tree | by-creator = delete all orphaned pages'
        required: true
        default: 'by-creator'
        type: choice
        options:
          - by-creator
          - by-parent

jobs:
  delete-confluence:
    name: Delete Confluence pages
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'DELETE' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Delete Confluence pages
        env:
          ATLASSIAN_DOMAIN:     ${{ secrets.ATLASSIAN_DOMAIN }}
          ATLASSIAN_EMAIL:      ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN:  ${{ secrets.ATLASSIAN_API_TOKEN }}
          CONFLUENCE_FOLDER_ID: ${{ secrets.CONFLUENCE_FOLDER_ID }}
        run: |
          MODE_FLAG=""
          if [ "${{ github.event.inputs.mode }}" = "by-creator" ]; then
            MODE_FLAG="--by-creator"
          fi
          python .github/scripts/delete_confluence.py $MODE_FLAG --yes
